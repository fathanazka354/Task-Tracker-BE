version: '3.8'

services:
  backend:
    build: .
    container_name: task-tracker-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/root/data/tasks.db
    volumes:
      - task_data:/root/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  task_data:
